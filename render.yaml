# Render Blueprint — defines all Wallmeri services in one file.
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# https://render.com/docs/blueprint-spec

databases:
  - name: wallmeri-db
    databaseName: wallmeri
    user: wallmeri
    plan: free          # upgrade to starter ($7/mo) before launch

services:
  # ── FastAPI backend ─────────────────────────────────────────────────────────
  - type: web
    name: wallmeri-api
    env: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free          # upgrade before launch (free tier spins down)
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wallmeri-db
          property: connectionString
      - key: ENV
        value: production
      # CORS must include the deployed web URL, e.g. https://wallmeri-web.onrender.com
      # Update this after the web service is first deployed.
      - key: CORS_ORIGINS
        value: https://wallmeri-web.onrender.com
      - key: JWT_SECRET
        sync: false       # enter manually in Render dashboard (never commit secrets)
      - key: ADMIN_EMAIL
        value: admin@wallmeri.in
      - key: ADMIN_PASSWORD
        sync: false       # enter manually
      - key: ADMIN_NAME
        value: Wallmeri Admin
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SHIPPING_FLAT_INR
        value: "99"
      # Public base URLs — used to build image/upload URLs and links in emails.
      # Update if your service names/domains differ.
      - key: PUBLIC_API_BASE_URL
        value: https://wallmeri-api.onrender.com
      - key: PUBLIC_WEB_BASE_URL
        value: https://wallmeri-web.onrender.com
      # Google sign-in (optional — customers get a "Continue with Google" button).
      # Must match the web service's NEXT_PUBLIC_GOOGLE_CLIENT_ID.
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Object storage for admin image uploads (S3-compatible, e.g. Cloudflare R2).
      # STRONGLY recommended in production: without it, uploads go to local disk,
      # which is EPHEMERAL on Render (lost on every deploy/restart) unless you
      # attach a persistent disk mounted at /app/uploads. See docs/DEPLOY.md.
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      # Transactional email via SMTP (optional — logs to console when unset).
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        value: Wallmeri <no-reply@wallmeri.in>

  # ── Next.js frontend ────────────────────────────────────────────────────────
  - type: web
    name: wallmeri-web
    env: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: apps/web
    plan: free
    branch: main
    autoDeploy: true
    # NEXT_PUBLIC_API_URL is a Docker build arg — baked into the client bundle
    # at build time. Replace with your actual API service URL after first deploy.
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://wallmeri-api.onrender.com/api
      # Same OAuth client id as the API's GOOGLE_CLIENT_ID (build-time, baked
      # into the client bundle). Leave unset to hide the Google button.
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
